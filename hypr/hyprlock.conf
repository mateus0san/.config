background {
	monitor =
	path = /home/mateus/Pictures/wallpaper/lonely_war.jpg
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(30, 40, 40, 1.0)  /* Dark grayish background */
    outer_color = rgba(50, 50, 50, 1.0) rgba(50, 50, 50, 1.0) 45deg /* Dark border with a slight gradient */
    check_color = rgba(0, 255, 153, 0.8) rgba(255, 102, 51, 0.8) 120deg /* Subtle green to orange gradient */
    fail_color = rgba(255, 102, 51, 0.8) rgba(255, 0, 102, 0.8) 40deg /* Red to pink gradient for failure */

    font_color = rgb(220, 220, 220) /* Light gray text for contrast */
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME12
    color = rgba(200, 200, 200, 1.0) /* Slightly lighter color for the text */
    font_size = 25

    position = 0, 80
    halign = center
    valign = center
}
