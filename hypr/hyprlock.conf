background {
	monitor =
	path = ~/Pictures/wallpaper/city.jpg
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(30, 40, 40, 1.0) 

    outer_color = rgba(aaaaaaaa) rgba(aaaaaaaa) 45deg
    check_color=rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}
label {
    monitor =
    text = $TIME12
    color = rgba(200, 200, 200, 1.0)
    font_size = 25

    position = 0, 80
    halign = center
    valign = center
}
