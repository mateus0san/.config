background {
    monitor =
    path = /home/mateus/Pictures/wallpaper/wp12680107-panorama-4k-wallpapers.jpg
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3

    inner_color = rgba(15, 15, 20, 0.95)       # Dark navy-ish interior
    outer_color = rgba(25, 25, 30, 1.0) rgba(35, 35, 40, 1.0) 60deg  # Subtle dark gradient border
    check_color = rgba(80, 200, 120, 0.9) rgba(50, 150, 200, 0.9) 100deg  # Green to teal check
    fail_color = rgba(200, 60, 60, 0.9) rgba(180, 30, 90, 0.9) 45deg  # Deep red to magenta fail

    font_color = rgb(235, 235, 235)  # Very light gray for text visibility
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME12
    color = rgba(220, 220, 220, 1.0)  # Light gray for time
    font_size = 25

    position = 0, 80
    halign = center
    valign = center
}
