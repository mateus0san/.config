general {
  gaps_in = 6
  gaps_out = 12
  border_size = 2
  col.active_border = rgba(ffffffff) rgba(0000ffff) 45deg
  col.inactive_border = rgba(595959aa)
  resize_on_border = true
  layout = dwindle
}

decoration {
  rounding = 10

  blur {
    enabled = true
    size = 6
    passes = 3
    vibrancy = 0.2
  }

  active_opacity = 0.9
  inactive_opacity = 0.7
}

animations {
  enabled = yes

  bezier = ease, 0.25, 0.1, 0.25, 0.25

  animation = windows, 1, 3, ease
  animation = windowsOut, 1, 3, ease
  animation = border, 1, 3, default
  animation = fade, 1, 3, ease
  animation = workspaces, 1, 3, ease
}
